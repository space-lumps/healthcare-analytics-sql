name: Minimal Syntax Test

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Multi-line run with heredoc
        run: |
          echo "Starting DuckDB simulation"
          cat <<EOF > test.log
          line 1
          line 2
          SELECT 'done' AS status;
          EOF
          cat test.log

      - name: Upload on failure (this is the step that was failing before)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dummy-log
          path: test.log