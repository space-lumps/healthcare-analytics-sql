name: SQL Pipeline Smoke Test

on:
  push:
    branches:
      - main
      - 'refactor/**'
  pull_request:
    branches: [ main ]

jobs:
  smoke-test:
    name: Build & Schema Check
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install DuckDB CLI (latest stable version)
      - name: Install DuckDB
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget https://github.com/duckdb/duckdb/releases/download/v1.1.0/duckdb_cli-linux-amd64.zip
          unzip duckdb_cli-linux-amd64.zip
          chmod +x duckdb
          sudo mv duckdb /usr/local/bin/

      # Verify DuckDB is installed
      - name: Verify DuckDB installation
        run: duckdb --version

      # Run normalization + cohort + schema validation in a single DuckDB session
      # TEMP VIEWs created in earlier scripts remain available
      - name: Execute core pipeline + schema check
        working-directory: sql/pipeline
        run: |
          duckdb -init "" <<EOF
          .read 10_normalize_sources.sql
          .read 20_build_cohort.sql
          .read tests/10_schema.sql
          EOF

          # Optional: explicit success marker for logs (helps debugging)
          echo "Core pipeline and schema validation completed successfully"

  validate-output:
    name: Validate Output CSV
    runs-on: ubuntu-latest
    needs: smoke-test

    steps:
      # Checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install DuckDB CLI (latest stable version)
      - name: Install DuckDB
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget https://github.com/duckdb/duckdb/releases/download/v1.1.0/duckdb_cli-linux-amd64.zip
          unzip duckdb_cli-linux-amd64.zip
          chmod +x duckdb
          sudo mv duckdb /usr/local/bin/

      # Run full pipeline and generate output CSV
      - name: Run full pipeline and generate output CSV
        working-directory: sql/pipeline
        run: |
          mkdir -p ../../output
          duckdb -init "" <<EOF
          .read 10_normalize_sources.sql
          .read 20_build_cohort.sql
          .read 30_output_csv.sql
          EOF

      - name: Verify overdose_cohort.csv exists and is non-empty
        working-directory: sql/pipeline
        run: |
          FILE="../../output/overdose_cohort.csv"
          if [ -f "$FILE" ] && [ -s "$FILE" ]; then
            echo "Output file exists and has content ✓"
            ls -lh "$FILE"
            head -n 5 "$FILE"  # Show sample rows in logs for visibility
          else
            echo "Output file missing or empty ✗"
            exit 1
          fi